name: iOS CI

on:
  push:
    branches: [ main ]
    paths:
      - 'WordMaster/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'WordMaster/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ./WordMaster

    steps:
    - uses: actions/checkout@v4

    - name: Set up Xcode
      run: |
        ls -la
        xcodebuild -version

    - name: Create Xcode Project
      run: |
        # Create project.yml for XcodeGen
        cat > project.yml << 'EOF'
        name: WordMaster
        options:
          bundleIdPrefix: com.wordmaster
          deploymentTarget:
            iOS: "16.0"
          xcodeVersion: "15.0"
        settings:
          base:
            MARKETING_VERSION: "1.0.0"
            CURRENT_PROJECT_VERSION: "1"
            DEVELOPMENT_TEAM: ""
            CODE_SIGN_IDENTITY: ""
            CODE_SIGNING_REQUIRED: "NO"
            CODE_SIGNING_ALLOWED: "NO"
        targets:
          WordMaster:
            type: application
            platform: iOS
            sources:
              - path: App
              - path: Models
              - path: Services
              - path: ViewModels
              - path: Views
              - path: Utilities
              - path: Resources
              - path: Info.plist
            settings:
              base:
                INFOPLIST_FILE: Info.plist
                PRODUCT_BUNDLE_IDENTIFIER: com.wordmaster.app
                GENERATE_INFOPLIST_FILE: NO
                SWIFT_VERSION: "5.9"
        EOF
        
        echo "project.yml created"

    - name: Check XcodeGen
      run: |
        which xcodegen || brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build for iOS Simulator
      run: |
        xcodebuild -project WordMaster.xcodeproj \
          -scheme WordMaster \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM=""

    - name: Build for Generic Device
      run: |
        xcodebuild -project WordMaster.xcodeproj \
          -scheme WordMaster \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/WordMaster.xcarchive \
          build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          DEVELOPMENT_TEAM=""

    - name: Export IPA
      run: |
        mkdir -p build
        xcodebuild -exportArchive \
          -archivePath build/WordMaster.xcarchive \
          -exportPath build \
          -exportOptionsPlist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>developer</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Development</string>
        </dict>
        </plist>
        EOF

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: WordMaster-IPA
        path: WordMaster/build/WordMaster.ipa
        retention-days: 30

    - name: Upload Build Products
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-products
        path: WordMaster/build/
        retention-days: 7
