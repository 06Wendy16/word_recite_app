name: Android CI

on:
  push:
    branches: [ main ]
    paths:
      - 'WordMasterAndroid/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'WordMasterAndroid/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./WordMasterAndroid

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: WordMaster-Debug-APK
        path: WordMasterAndroid/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: WordMaster-Release-APK
        path: WordMasterAndroid/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Upload Build Reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: WordMasterAndroid/app/build/reports/
        retention-days: 7
