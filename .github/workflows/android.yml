name: Android CI

on:
  push:
    branches: [ main ]
    paths:
      - 'WordMasterAndroid/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'WordMasterAndroid/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.4

    - name: Grant execute permission for gradlew
      run: chmod +x WordMasterAndroid/gradlew

    - name: Build Debug APK
      working-directory: ./WordMasterAndroid
      run: ./gradlew assembleDebug --no-daemon

    - name: List build output
      run: ls -la WordMasterAndroid/app/build/outputs/apk/debug/ || echo "Debug APK not found"

    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: WordMaster-Debug-APK
        path: WordMasterAndroid/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK
      working-directory: ./WordMasterAndroid
      run: ./gradlew assembleRelease --no-daemon
      continue-on-error: true

    - name: List Release build output
      run: ls -la WordMasterAndroid/app/build/outputs/apk/release/ 2>/dev/null || echo "Release APK not found"

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: WordMaster-Release-APK
        path: WordMasterAndroid/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
      if: always()

    - name: Upload Build Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: WordMasterAndroid/app/build/outputs/
        retention-days: 7
